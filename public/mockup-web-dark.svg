  <rect x="264" y="142" width="748" height="182" rx="20" fill="url(#briefing-bg)" filter="url(#shadow-briefing)"/>

  <!-- Onde décorative clippée à droite — très subtile, ne touche pas au texte -->
  <g clip-path="url(#clip-briefing-wave)">
    <g transform="translate(560, 50) scale(1.1)">
      <path d="M 28 100 C 38 100, 42 82, 52 82 C 62 82, 66 118, 76 118
               C 86 118, 88 68, 100 68 C 112 68, 114 132, 126 132
               C 138 132, 140 50, 154 50 C 164 50, 166 150, 172 150"
            fill="none" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.07"/>
    </g>
    <g transform="translate(590, 80) scale(0.95)">
      <path d="M 28 100 C 38 100, 42 82, 52 82 C 62 82, 66 118, 76 118
               C 86 118, 88 68, 100 68 C 112 68, 114 132, 126 132
               C 138 132, 140 50, 154 50 C 164 50, 166 150, 172 150"
            fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.1"/>
