  <line x1="1060" y1="209" x2="1060" y2="238" stroke="#2d3f57" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1074" y="200" font-size="12" font-weight="600" fill="#f8fafc">09:00 — Stand-up</text>
  <text x="1074" y="215" font-size="11" fill="#64748b">Teams · 30 min</text>

  <circle cx="1060" cy="248" r="5" fill="#A855F7"/>
  <line x1="1060" y1="253" x2="1060" y2="282" stroke="#2d3f57" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1074" y="244" font-size="12" font-weight="600" fill="#f8fafc">11:30 — Médecin</text>
  <text x="1074" y="259" font-size="11" fill="#64748b">Rappel traitement</text>

  <circle cx="1060" cy="292" r="5" fill="#EC4899"/>
  <line x1="1060" y1="297" x2="1060" y2="326" stroke="#2d3f57" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1074" y="288" font-size="12" font-weight="600" fill="#f8fafc">14:00 — Budget Q2</text>
  <text x="1074" y="303" font-size="11" fill="#64748b">Notion · Review</text>

  <circle cx="1060" cy="336" r="5" fill="#334155"/>
  <text x="1074" y="332" font-size="12" fill="#64748b">18:00 — Sport</text>

  <!-- Tâches rapides -->
  <rect x="1030" y="366" width="222" height="182" rx="16" fill="#1e293b" filter="url(#shadow-card)"/>
  <rect x="1030" y="366" width="222" height="182" rx="16" fill="none" stroke="#2d3f57" stroke-width="1"/>
  <text x="1050" y="392" font-size="13" font-weight="600" fill="#f8fafc">Tâches rapides</text>
  <line x1="1050" y1="402" x2="1232" y2="402" stroke="#2d3f57" stroke-width="1"/>

  <!-- Task items -->
  <rect x="1048" y="412" width="18" height="18" rx="5" fill="#6366F1"/>
  <polyline points="1052,421 1056,426 1064,416" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1074" y="426" font-size="12" fill="#64748b" text-decoration="line-through">Prendre magnésium</text>

  <rect x="1048" y="438" width="18" height="18" rx="5" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="1074" y="452" font-size="12" fill="#f8fafc">Review budget Q2</text>

  <rect x="1048" y="464" width="18" height="18" rx="5" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="1074" y="478" font-size="12" fill="#f8fafc">Répondre à Thomas</text>
  <rect x="1184" y="462" width="46" height="18" rx="5" fill="#EC4899" opacity="0.2"/>
  <text x="1190" y="475" font-size="10" font-weight="600" fill="#F9A8D4">Urgent</text>

  <!-- CTA -->
  <rect x="1048" y="498" width="186" height="38" rx="12" fill="url(#pulse)"/>
  <text text-anchor="middle" x="1141" y="522" font-size="13" font-weight="600" fill="white">+ Nouvelle tâche</text>

  <!-- ══ STATUS BAR ══ -->
  <rect x="240" y="758" width="1040" height="42" fill="#0f172a"/>
  <rect x="240" y="758" width="1040" height="1" fill="#1e293b"/>
  <circle cx="268" cy="779" r="4" fill="#10B981"/>
  <text x="280" y="783" font-size="11" fill="#475569">4 connecteurs actifs</text>
  <text x="860" y="783" font-size="11" fill="#2d3f57">LifeFlow v1.0 · Sync il y a 2 min</text>
</svg>
