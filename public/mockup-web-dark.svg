  <text x="264" y="102" font-size="25" font-weight="700" letter-spacing="-0.5" fill="#f8fafc">Bonjour, Jérémy 👋</text>
  <text x="264" y="124" font-size="13.5" fill="#64748b">Voici votre résumé du vendredi 13 mars 2026</text>

