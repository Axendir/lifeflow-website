<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="briefing-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="60%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="nav-active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="health-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="finance-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- Clip pour l'onde de la card briefing : zone droite uniquement -->
    <clipPath id="clip-briefing-wave">
      <rect x="720" y="150" width="320" height="196"/>
    </clipPath>
    <filter id="shadow-card">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-briefing">
      <feDropShadow dx="0" dy="6" stdDeviation="24" flood-color="#7C3AED" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ══ FOND PRINCIPAL ══ -->
  <rect width="1280" height="800" fill="#0f172a"/>

  <!-- ══ SIDEBAR ══ -->
  <rect x="0" y="0" width="240" height="800" fill="#1e293b"/>
  <rect x="239" y="0" width="1" height="800" fill="#2d3f57"/>

  <!-- ── Logo empilé : onde AU-DESSUS de LifeFlow ── -->
  <!-- Onde Pulse centrée dans sidebar (240px → centre x=120) -->
  <g transform="translate(70, 18) scale(0.5)">
    <path d="M 28 100 C 38 100, 42 82, 52 82 C 62 82, 66 118, 76 118
             C 86 118, 88 68, 100 68 C 112 68, 114 132, 126 132
             C 138 132, 140 50, 154 50 C 164 50, 166 150, 172 150"
          fill="none" stroke="url(#pulse)" stroke-width="11" stroke-linecap="round"/>
  </g>
  <!-- "LifeFlow" centré sous l'onde -->
  <text text-anchor="middle" x="120" y="94" font-size="15" letter-spacing="-0.3">
    <tspan font-weight="700" fill="#f8fafc">Life</tspan><tspan font-weight="300" fill="#94a3b8">Flow</tspan>
  </text>

  <!-- Séparateur -->
  <line x1="20" y1="108" x2="220" y2="108" stroke="#2d3f57" stroke-width="1"/>

  <!-- Label nav -->
  <text x="20" y="128" font-size="9.5" font-weight="600" letter-spacing="1.3" fill="#475569">NAVIGATION</text>

  <!-- ── Nav items ── -->
  <!-- Dashboard (actif) -->
  <rect x="10" y="136" width="220" height="40" rx="10" fill="url(#nav-active)"/>
  <rect x="10" y="136" width="3" height="40" rx="1.5" fill="url(#pulse)"/>
  <path d="M 34 164 L 34 157 L 44 149 L 54 157 L 54 164 Z" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="38" y="158" width="6" height="6" rx="1" fill="#A855F7"/>
  <text x="66" y="161" font-size="13" font-weight="600" fill="#A855F7">Dashboard</text>

  <!-- Productivité -->
  <rect x="36" y="189" width="16" height="16" rx="3" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="39" y1="195" x2="49" y2="195" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="199" x2="47" y2="199" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <text x="62" y="202" font-size="13" fill="#64748b">Productivité</text>

  <!-- Santé -->
  <path d="M 44 227 C 44 222, 37 218, 37 223 C 37 228, 44 233, 44 233 C 44 233, 51 228, 51 223 C 51 218, 44 222, 44 227Z"
        fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="62" y="232" font-size="13" fill="#64748b">Santé</text>

  <!-- Finances -->
  <circle cx="44" cy="263" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="41" y="267" font-size="9" font-weight="600" fill="#475569">€</text>
  <text x="62" y="268" font-size="13" fill="#64748b">Finances</text>

  <!-- Sep -->
  <line x1="20" y1="290" x2="220" y2="290" stroke="#2d3f57" stroke-width="1"/>
  <text x="20" y="310" font-size="9.5" font-weight="600" letter-spacing="1.3" fill="#475569">CONNECTEURS</text>

  <!-- Connecteurs -->
  <circle cx="34" cy="330" r="4" fill="#10B981"/>
  <text x="46" y="334" font-size="12" fill="#64748b">Google Calendar</text>
  <circle cx="34" cy="352" r="4" fill="#10B981"/>
  <text x="46" y="356" font-size="12" fill="#64748b">Notion</text>
  <circle cx="34" cy="374" r="4" fill="#F59E0B"/>
  <text x="46" y="378" font-size="12" fill="#64748b">Withings</text>
  <circle cx="34" cy="396" r="4" fill="#475569"/>
  <text x="46" y="400" font-size="12" fill="#64748b">Boursobank</text>

  <!-- User -->
  <rect x="10" y="742" width="220" height="46" rx="10" fill="#0f172a" opacity="0.6"/>
  <circle cx="38" cy="765" r="14" fill="url(#pulse)"/>
  <text text-anchor="middle" x="38" y="769" font-size="11" font-weight="700" fill="white">JD</text>
  <text x="58" y="761" font-size="12" font-weight="600" fill="#f8fafc">Jérémy Dugué</text>
  <text x="58" y="777" font-size="11" fill="#64748b">Plan Pro</text>

  <!-- ══ TOPBAR ══ -->
  <rect x="240" y="0" width="1040" height="60" fill="#0f172a"/>
  <rect x="240" y="59" width="1040" height="1" fill="#1e293b"/>

  <!-- Search -->
  <rect x="264" y="14" width="300" height="34" rx="9" fill="#1e293b" stroke="#2d3f57" stroke-width="1"/>
  <circle cx="287" cy="31" r="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="292" y1="36" x2="298" y2="42" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <text x="308" y="36" font-size="13" fill="#475569">Rechercher...</text>

  <!-- Date -->
  <text x="900" y="35" font-size="12" fill="#64748b">Vendredi 13 mars 2026</text>

  <!-- Bell -->
  <rect x="1154" y="14" width="34" height="34" rx="9" fill="#1e293b"/>
  <path d="M 1171 21 C 1171 19, 1169 18, 1167 18 C 1165 18, 1163 19, 1163 21 L 1163 28 L 1160 31 L 1174 31 L 1171 28Z"
        fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="1167" cy="33" r="1.5" fill="#94a3b8"/>
  <circle cx="1176" cy="17" r="5" fill="#EC4899"/>
  <text text-anchor="middle" x="1176" y="20" font-size="7" font-weight="700" fill="white">3</text>

  <!-- Avatar -->
  <circle cx="1228" cy="30" r="16" fill="url(#pulse)"/>
  <text text-anchor="middle" x="1228" y="35" font-size="12" font-weight="700" fill="white">JD</text>

