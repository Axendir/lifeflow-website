  <text x="580" y="391" font-size="12.5" font-weight="600" fill="#94a3b8">Santé</text>
  <text x="536" y="428" font-size="34" font-weight="700" letter-spacing="-1" fill="#f8fafc">7h22</text>
  <text x="536" y="448" font-size="12" fill="#64748b">Sommeil · +14 min</text>
  <rect x="536" y="460" width="196" height="5" rx="2.5" fill="#334155"/>
  <rect x="536" y="460" width="172" height="5" rx="2.5" fill="url(#health-bar)"/>
  <text x="536" y="480" font-size="11.5" fill="#475569">Poids: 72.4 kg · FC: 62 bpm</text>
  <rect x="536" y="498" width="90" height="28" rx="9" fill="#10B981" opacity="0.14"/>
  <text x="557" y="517" font-size="12" font-weight="600" fill="#34D399">Voir tout →</text>

  <!-- ── Finances ── -->
  <rect x="768" y="348" width="244" height="200" rx="16" fill="#1e293b" filter="url(#shadow-card)"/>
  <rect x="768" y="348" width="244" height="200" rx="16" fill="none" stroke="#2d3f57" stroke-width="1"/>
  <rect x="788" y="368" width="34" height="34" rx="10" fill="#F59E0B" opacity="0.18"/>
  <circle cx="805" cy="385" r="7.5" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <text text-anchor="middle" x="805" y="389" font-size="8.5" font-weight="700" fill="#FCD34D">€</text>
  <text x="832" y="391" font-size="12.5" font-weight="600" fill="#94a3b8">Finances</text>
  <text x="788" y="428" font-size="30" font-weight="700" letter-spacing="-1" fill="#f8fafc">2 840 €</text>
  <text x="788" y="448" font-size="12" fill="#64748b">Solde disponible</text>
  <rect x="788" y="460" width="204" height="5" rx="2.5" fill="#334155"/>
  <rect x="788" y="460" width="122" height="5" rx="2.5" fill="url(#finance-bar)"/>
  <text x="788" y="480" font-size="11.5" fill="#475569">Budget 60% · 3 alertes</text>
  <rect x="788" y="498" width="90" height="28" rx="9" fill="#F59E0B" opacity="0.14"/>
  <text x="808" y="517" font-size="12" font-weight="600" fill="#FCD34D">Voir tout →</text>

  <!-- ══ PANNEAU DROIT — Agenda ══ -->
  <rect x="1030" y="142" width="222" height="208" rx="16" fill="#1e293b" filter="url(#shadow-card)"/>
  <rect x="1030" y="142" width="222" height="208" rx="16" fill="none" stroke="#2d3f57" stroke-width="1"/>
  <text x="1050" y="170" font-size="13" font-weight="600" fill="#f8fafc">Agenda du jour</text>
  <line x1="1050" y1="180" x2="1232" y2="180" stroke="#2d3f57" stroke-width="1"/>

  <!-- Timeline -->
