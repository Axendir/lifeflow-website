  <!-- ── Productivité ── -->
  <rect x="264" y="348" width="236" height="200" rx="16" fill="#1e293b" filter="url(#shadow-card)"/>
  <rect x="264" y="348" width="236" height="200" rx="16" fill="none" stroke="#2d3f57" stroke-width="1"/>
  <rect x="284" y="368" width="34" height="34" rx="10" fill="#6366F1" opacity="0.18"/>
  <rect x="293" y="377" width="16" height="13" rx="2" fill="none" stroke="#818CF8" stroke-width="1.5"/>
  <line x1="296" y1="382" x2="306" y2="382" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="296" y1="386" x2="304" y2="386" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="328" y="391" font-size="12.5" font-weight="600" fill="#94a3b8">Productivité</text>
  <text x="284" y="428" font-size="34" font-weight="700" letter-spacing="-1" fill="#f8fafc">78%</text>
  <text x="284" y="448" font-size="12" fill="#64748b">Tâches complétées</text>
  <rect x="284" y="460" width="196" height="5" rx="2.5" fill="#334155"/>
  <rect x="284" y="460" width="153" height="5" rx="2.5" fill="url(#pulse)"/>
  <text x="284" y="480" font-size="11.5" fill="#475569">5 / 8 tâches · 2 en retard</text>
  <rect x="284" y="498" width="90" height="28" rx="9" fill="#6366F1" opacity="0.14"/>
  <text x="307" y="517" font-size="12" font-weight="600" fill="#818CF8">Voir tout →</text>

  <!-- ── Santé ── -->
  <rect x="516" y="348" width="236" height="200" rx="16" fill="#1e293b" filter="url(#shadow-card)"/>
  <rect x="516" y="348" width="236" height="200" rx="16" fill="none" stroke="#2d3f57" stroke-width="1"/>
  <rect x="536" y="368" width="34" height="34" rx="10" fill="#10B981" opacity="0.18"/>
  <path d="M 553 385 C 553 380, 546 376, 546 381 C 546 386, 553 391, 553 391 C 553 391, 560 386, 560 381 C 560 376, 553 380, 553 385Z"
