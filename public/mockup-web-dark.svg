  <text x="296" y="216" font-size="22" font-weight="700" letter-spacing="-0.5" fill="white">3 tâches prioritaires · Score 87/100</text>
  <text x="296" y="242" font-size="13.5" fill="white" opacity="0.82">Bonne journée en perspective. Votre réunion Teams commence dans 2h.</text>

  <!-- Stat pills -->
  <rect x="296" y="258" width="112" height="28" rx="14" fill="white" opacity="0.14"/>
  <text x="315" y="277" font-size="12" font-weight="500" fill="white">🗓  2 événements</text>
  <rect x="418" y="258" width="96" height="28" rx="14" fill="white" opacity="0.14"/>
  <text x="436" y="277" font-size="12" font-weight="500" fill="white">✅  5 tâches</text>
  <rect x="524" y="258" width="102" height="28" rx="14" fill="white" opacity="0.14"/>
  <text x="542" y="277" font-size="12" font-weight="500" fill="white">💊  Rappel 8h</text>

  <!-- Bouton voir -->
  <rect x="920" y="258" width="72" height="28" rx="14" fill="white" opacity="0.18"/>
  <text x="937" y="277" font-size="12" font-weight="600" fill="white">Voir →</text>

