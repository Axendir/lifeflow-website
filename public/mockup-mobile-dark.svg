<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="score-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="health-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#7C3AED" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Phone background -->
  <rect width="390" height="844" fill="#0f172a"/>

  <!-- ── STATUS BAR ── -->
  <text x="28" y="24" font-size="15" font-weight="600" fill="#f8fafc">9:41</text>
  <!-- Battery -->
  <rect x="332" y="14" width="30" height="14" rx="3" fill="none" stroke="#f8fafc" stroke-width="1.5"/>
  <rect x="362" y="19" width="3" height="4" rx="1" fill="#f8fafc"/>
  <rect x="334" y="16" width="22" height="10" rx="2" fill="#f8fafc"/>
  <!-- WiFi -->
  <path d="M 310 22 Q 313 18 316 22" fill="none" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 306 26 Q 313 15 320 26" fill="none" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="313" cy="24" r="2" fill="#f8fafc"/>

  <!-- ── HEADER ── -->
  <text x="24" y="72" font-size="28" font-weight="700" letter-spacing="-0.8" fill="#f8fafc">Bonjour 👋</text>
  <text x="24" y="96" font-size="14" font-weight="400" fill="#64748b">Vendredi 13 mars 2026</text>

  <!-- Notification bell -->
  <rect x="330" y="60" width="40" height="40" rx="12" fill="#1e293b"/>
  <path d="M 350 70 C 350 67, 348 66, 345 66 C 342 66, 340 68, 340 70 L 340 77 L 337 80 L 353 80 L 350 77 Z" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="345" cy="82" r="1.5" fill="#94a3b8"/>
  <circle cx="352" cy="65" r="6" fill="#EC4899"/>
  <text x="349" y="68" font-size="7.5" font-weight="700" fill="white">2</text>

  <!-- ── TODAY SCORE CARD ── -->
  <rect x="20" y="116" width="350" height="180" rx="24" fill="url(#score-card)" filter="url(#card-shadow)"/>
  <rect x="20" y="116" width="350" height="180" rx="24" fill="white" opacity="0.04"/>
  <!-- Pulse wave decoration -->
  <path d="M 30 206 C 48 206, 52 186, 70 186 C 88 186, 92 226, 110 226 C 128 226, 130 176, 150 176 C 170 176, 172 236, 192 236 C 212 236, 214 160, 234 160 C 254 160, 256 245, 270 245"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Card content -->
  <text x="44" y="150" font-size="11" font-weight="600" letter-spacing="1.5" fill="white" opacity="0.7">DAILY SCORE</text>
  <text x="44" y="194" font-size="52" font-weight="700" letter-spacing="-2" fill="white">87</text>
  <text x="104" y="194" font-size="26" font-weight="300" fill="white" opacity="0.6">/100</text>
  <!-- Score bar -->
  <rect x="44" y="208" width="200" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="44" y="208" width="174" height="6" rx="3" fill="white" opacity="0.8"/>
  <text x="44" y="230" font-size="12" fill="white" opacity="0.75">Excellent · +4 pts vs hier</text>
  <!-- Mini stats -->
  <text x="270" y="168" font-size="11" fill="white" opacity="0.7">Santé</text>
  <text x="270" y="186" font-size="18" font-weight="700" fill="white">91</text>
  <text x="320" y="168" font-size="11" fill="white" opacity="0.7">Focus</text>
  <text x="320" y="186" font-size="18" font-weight="700" fill="white">82</text>
  <text x="270" y="215" font-size="11" fill="white" opacity="0.7">Finance</text>
  <text x="270" y="233" font-size="18" font-weight="700" fill="white">85</text>

  <!-- ── QUICK STATS ROW ── -->
  <rect x="20" y="314" width="107" height="76" rx="16" fill="#1e293b"/>
  <text x="40" y="344" font-size="10" font-weight="600" letter-spacing="0.5" fill="#64748b">SOMMEIL</text>
  <text x="40" y="368" font-size="20" font-weight="700" fill="#f8fafc">7h22</text>
  <text x="40" y="382" font-size="10" fill="#10B981">▲ +14 min</text>

  <rect x="141" y="314" width="107" height="76" rx="16" fill="#1e293b"/>
  <text x="161" y="344" font-size="10" font-weight="600" letter-spacing="0.5" fill="#64748b">PAS</text>
  <text x="161" y="368" font-size="20" font-weight="700" fill="#f8fafc">6 218</text>
  <text x="161" y="382" font-size="10" fill="#64748b">/ 8 000</text>

  <rect x="262" y="314" width="108" height="76" rx="16" fill="#1e293b"/>
  <text x="282" y="344" font-size="10" font-weight="600" letter-spacing="0.5" fill="#64748b">SOLDE</text>
  <text x="282" y="365" font-size="16" font-weight="700" fill="#f8fafc">2 840€</text>
  <text x="282" y="382" font-size="10" fill="#F59E0B">3 alertes</text>

  <!-- ── TASKS SECTION ── -->
  <text x="24" y="422" font-size="16" font-weight="700" letter-spacing="-0.3" fill="#f8fafc">À faire aujourd'hui</text>
  <text x="322" y="422" font-size="13" font-weight="500" fill="#6366F1">Voir tout</text>

  <!-- Task 1 — done -->
  <rect x="20" y="434" width="350" height="60" rx="14" fill="#1e293b"/>
  <rect x="36" y="454" width="22" height="22" rx="6" fill="#6366F1"/>
  <polyline points="41,466 45,471 54,462" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="70" y="462" font-size="14" font-weight="500" fill="#64748b" text-decoration="line-through">Prendre magnésium</text>
  <text x="70" y="478" font-size="11" fill="#475569">08:00 · Rappel Santé</text>
  <circle cx="352" cy="464" r="4" fill="#10B981"/>

  <!-- Task 2 — pending -->
  <rect x="20" y="502" width="350" height="60" rx="14" fill="#1e293b"/>
  <rect x="36" y="522" width="22" height="22" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="530" font-size="14" font-weight="500" fill="#f8fafc">Review budget Q2</text>
  <text x="70" y="546" font-size="11" fill="#475569">14:00 · Finances</text>
  <rect x="320" y="519" width="38" height="20" rx="6" fill="#F59E0B" opacity="0.2"/>
  <text x="327" y="533" font-size="10" font-weight="600" fill="#FCD34D">14:00</text>

  <!-- Task 3 — pending -->
  <rect x="20" y="570" width="350" height="60" rx="14" fill="#1e293b"/>
  <rect x="36" y="590" width="22" height="22" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="598" font-size="14" font-weight="500" fill="#f8fafc">Répondre à Thomas</text>
  <text x="70" y="614" font-size="11" fill="#475569">Messages · WhatsApp</text>
  <rect x="314" y="587" width="44" height="20" rx="6" fill="#EC4899" opacity="0.2"/>
  <text x="320" y="601" font-size="10" font-weight="600" fill="#F9A8D4">Urgent</text>

  <!-- ── CTA BUTTON ── -->
  <rect x="20" y="648" width="350" height="56" rx="18" fill="url(#pulse)"/>
  <text x="115" y="682" font-size="15" font-weight="600" fill="white">✨ Morning Briefing IA</text>

  <!-- ── TAB BAR ── -->
  <rect x="0" y="760" width="390" height="84" fill="#1e293b"/>
  <rect x="0" y="760" width="390" height="1" fill="#334155"/>

  <!-- Tab: Home (active) -->
  <g transform="translate(15, 770)">
    <rect x="24" y="0" width="50" height="50" rx="14" fill="url(#pulse)" opacity="0.15"/>
    <!-- Home icon -->
    <rect x="33" y="21" width="22" height="18" rx="2" fill="none" stroke="#A855F7" stroke-width="1.5"/>
    <polyline points="27,25 44,10 61,25" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="27" y="62" font-size="10" font-weight="600" fill="#A855F7">Accueil</text>
  </g>

  <!-- Tab: Tasks -->
  <g transform="translate(88, 770)">
    <rect x="33" y="8" width="14" height="18" rx="2" fill="none" stroke="#475569" stroke-width="1.5"/>
    <line x1="36" y1="13" x2="44" y2="13" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="17" x2="42" y2="17" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="21" x2="44" y2="21" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <text x="27" y="62" font-size="10" fill="#475569">Tâches</text>
  </g>

  <!-- Tab: Health -->
  <g transform="translate(161, 770)">
    <path d="M 44 20 C 44 15, 37 11, 37 16 C 37 21, 44 26, 44 26 C 44 26, 51 21, 51 16 C 51 11, 44 15, 44 20Z" fill="none" stroke="#475569" stroke-width="1.5"/>
    <text x="31" y="62" font-size="10" fill="#475569">Santé</text>
  </g>

  <!-- Tab: Finance -->
  <g transform="translate(234, 770)">
    <circle cx="44" cy="18" r="10" fill="none" stroke="#475569" stroke-width="1.5"/>
    <text x="41" y="22" font-size="10" font-weight="700" fill="#475569">€</text>
    <text x="27" y="62" font-size="10" fill="#475569">Finances</text>
  </g>

  <!-- Tab: Settings -->
  <g transform="translate(307, 770)">
    <circle cx="44" cy="18" r="5" fill="none" stroke="#475569" stroke-width="1.5"/>
    <circle cx="44" cy="18" r="10" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3.5,3"/>
    <text x="26" y="62" font-size="10" fill="#475569">Réglages</text>
  </g>

  <!-- Home indicator -->
  <rect x="148" y="832" width="94" height="5" rx="2.5" fill="#f8fafc" opacity="0.3"/>
</svg>
